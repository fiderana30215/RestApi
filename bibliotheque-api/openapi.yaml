openapi: '3.0.3'
info:
  title: API Bibliothèque
  version: '1.0.0'
  description: |
    API REST de gestion d'une bibliothèque — Cours 2026.
    Gestion des auteurs, des livres et des emprunts avec authentification JWT.
  contact:
    name: Étudiant L3
servers:
  - url: http://localhost:8000/api/v1
    description: Serveur de développement
  - url: https://api.mabibliotheque.com/v1
    description: Serveur de production

tags:
  - name: Auth
    description: Authentification
  - name: Authors
    description: Gestion des auteurs
  - name: Books
    description: Gestion des livres
  - name: Borrows
    description: Gestion des emprunts

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Author:
      type: object
      properties:
        id: { type: integer, example: 1 }
        first_name: { type: string, example: Robert }
        last_name: { type: string, example: Martin }
        nationality: { type: string, example: Américaine }

    AuthorWithBooks:
      allOf:
        - $ref: '#/components/schemas/Author'
        - type: object
          properties:
            books:
              type: array
              items: { $ref: '#/components/schemas/Book' }

    Book:
      type: object
      properties:
        id: { type: integer, example: 1 }
        title: { type: string, example: Clean Code }
        isbn: { type: string, example: '978-0132350884' }
        year: { type: integer, example: 2008 }
        available: { type: boolean, example: true }
        author_id: { type: integer, example: 1 }
        author: { $ref: '#/components/schemas/Author' }

    Borrow:
      type: object
      properties:
        id: { type: integer, example: 1 }
        user_name: { type: string, example: Alice Dupont }
        book_id: { type: integer, example: 3 }
        borrowed_at: { type: string, format: date-time }
        returned_at:
          type: string
          format: date-time
          nullable: true

    CreateAuthorInput:
      type: object
      required: [first_name, last_name, nationality]
      properties:
        first_name: { type: string, example: Victor }
        last_name: { type: string, example: Hugo }
        nationality: { type: string, example: Française }

    UpdateAuthorInput:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        nationality: { type: string }

    CreateBookInput:
      type: object
      required: [title, isbn, year, author_id]
      properties:
        title: { type: string, example: Clean Code }
        isbn: { type: string, example: '978-0132350884' }
        year: { type: integer, example: 2008 }
        available: { type: boolean, example: true }
        author_id: { type: integer, example: 1 }

    UpdateBookInput:
      type: object
      properties:
        title: { type: string }
        isbn: { type: string }
        year: { type: integer }
        available: { type: boolean }
        author_id: { type: integer }

    BorrowInput:
      type: object
      required: [user_name, book_id]
      properties:
        user_name: { type: string, example: Alice Dupont }
        book_id: { type: integer, example: 4 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: admin@biblio.local }
        password: { type: string, format: password, example: admin123 }

    AuthPayload:
      type: object
      properties:
        token: { type: string, example: eyJhbGciOi... }
        user:
          type: object
          properties:
            id: { type: integer }
            email: { type: string }
            name: { type: string }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object }
        message: { type: string }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: Validation échouée }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

  responses:
    Unauthorized:
      description: Non authentifié
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Validation échouée
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Authentification
      description: Retourne un token JWT à utiliser dans l'en-tête `Authorization: Bearer`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginInput' }
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuthPayload' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /authors:
    get:
      tags: [Authors]
      summary: Liste tous les auteurs
      responses:
        '200':
          description: Liste des auteurs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Author' }
                  message: { type: string }
    post:
      tags: [Authors]
      summary: Créer un auteur
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAuthorInput' }
      responses:
        '201':
          description: Auteur créé
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /authors/{id}:
    get:
      tags: [Authors]
      summary: Détails d'un auteur + ses livres
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Détails de l'auteur
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/AuthorWithBooks' }
                  message: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Authors]
      summary: Modifier un auteur
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAuthorInput' }
      responses:
        '200':
          description: Auteur modifié
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Authors]
      summary: Supprimer un auteur
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Auteur supprimé }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /books:
    get:
      tags: [Books]
      summary: Liste les livres
      parameters:
        - name: available
          in: query
          schema: { type: boolean }
          description: Filtrer par disponibilité
      responses:
        '200':
          description: Liste des livres
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Book' }
                  message: { type: string }
    post:
      tags: [Books]
      summary: Ajouter un livre
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBookInput' }
      responses:
        '201': { description: Livre créé }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /books/{id}:
    get:
      tags: [Books]
      summary: Détails d'un livre + auteur
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Détails du livre
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Book' }
                  message: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Books]
      summary: Modifier un livre
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBookInput' }
      responses:
        '200': { description: Livre modifié }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Books]
      summary: Supprimer un livre
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Livre supprimé }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /borrows:
    get:
      tags: [Borrows]
      summary: Liste tous les emprunts en cours
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Emprunts en cours
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Borrow' }
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Borrows]
      summary: Enregistrer un emprunt
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BorrowInput' }
      responses:
        '201':
          description: Emprunt créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Borrow' }
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /borrows/{id}/return:
    patch:
      tags: [Borrows]
      summary: Marquer un livre comme rendu
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Livre rendu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Borrow' }
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
